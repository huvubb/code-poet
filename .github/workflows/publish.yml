name: 发布 Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 打包 CLI
        working-directory: code-poet-cli
        run: npm pack

      - name: 打包 VS Code
        working-directory: code-poet-vscode
        run: |
          npm install -g @vscode/vsce
          vsce package

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            code-poet-cli/*.tgz
            code-poet-vscode/*.vsix
          generate_release_notes: true
